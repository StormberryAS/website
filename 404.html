<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page not found - Stormberry A.S." />
    <meta name="theme-color" content="#F8F9FA" />
    <link rel="apple-touch-icon" href="/logo.webp" />
    <meta name="robots" content="noindex, follow" />
    
    <script src="/lucide.min.js"></script>
    <link rel="stylesheet" href="/style.css" />

    <title>Stormberry A.S. | Smarter Sales, Global Culture, AI Strategy</title>
  </head>
  <body>
    <div class="app-container">
      <div class="not-found">
        <div class="not-found-background">
          <div class="glow glow-1"></div>
          <div class="glow glow-2"></div>
        </div>
        <div class="container not-found-container">
          <div class="not-found-content animate-fade-in-up">
            <h1 class="not-found-code">
              4<span class="text-gradient">0</span>4
            </h1>
            <h2 class="not-found-title">Page Not Found</h2>
            <p class="not-found-text">
              The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="not-found-actions">
              <button onclick="history.back()" class="btn btn-outline" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid var(--border-color); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 500;">
                <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i> Go Back
              </button>
              <a href="/" class="btn btn-primary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i data-lucide="home" style="width: 18px; height: 18px;"></i> Home
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
